<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Yijing β-VAE</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  body { font-family: system-ui, sans-serif; background:#11141a; color:#e8e8ec;
         display:flex; min-height:100vh; align-items:center; justify-content:center;
         margin:0; }
  .card { background:#1b1f2a; padding:2.5rem 3rem; border-radius:16px;
          box-shadow:0 10px 40px rgba(0,0,0,.5); max-width:560px; }
  h1 { margin-top:0; font-weight:600; letter-spacing:.04em; }
  p { line-height:1.6; color:#b8bfcd; }
  .links { display:flex; gap:1rem; margin-top:1.6rem; }
  a.btn { flex:1; text-align:center; padding:.9rem 1.2rem; border-radius:10px;
          background:#3a4a78; color:white; text-decoration:none; font-weight:600;
          transition:background .2s; }
  a.btn:hover { background:#4f63a0; }
  .hex { font-size:2.4rem; letter-spacing:.4rem; margin-bottom:.6rem; color:#d7c98a; }
</style>
</head>
<body>
  <div class="card">
    <div class="hex">䷀ ䷁ ䷂ ䷃ ䷄ ䷅</div>
    <h1>Yijing β-VAE</h1>
    <p>A Variational Auto-Encoder with <b>six latent variables</b>, one for each
       <i>yao</i> (line) of an <i>I Ching</i> hexagram. Train it on image data,
       then play with the six lines to see what the model imagines.</p>
    <div class="links">
      <a class="btn" href="/train">Train</a>
      <a class="btn" href="/play">Play</a>
    </div>
  </div>
</body>
</html>

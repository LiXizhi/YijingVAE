<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>推演 · 易经 β-VAE</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
         background:#11141a; color:#e8e8ec;
         margin:0; padding:1.5rem; }
  h1 { margin:0 0 1rem; font-weight:600; }
  nav a { color:#8ab1ff; margin-right:1rem; text-decoration:none; }
  .wrap { display:grid; gap:1.5rem; grid-template-columns: 1fr 1fr;
          align-items:start; }
  @media (max-width: 820px) { .wrap { grid-template-columns:1fr; } }
  .card { background:#1b1f2a; border-radius:14px; padding:1.4rem 1.6rem;
          box-shadow:0 4px 18px rgba(0,0,0,.4); }
  /* 卦象自下而上：六爻滑块以倒序显示，上爻在上、初爻在下 */
  #yaos { display:flex; flex-direction:column-reverse; }
  .yao-row { display:grid; grid-template-columns: 90px 1fr 60px; align-items:center;
             gap:.8rem; padding:.55rem 0; border-bottom:1px dashed #2a3142; }
  .yao-row:first-child { border:none; }
  .yao-name { font-weight:600; color:#d7c98a; }
  .yao-value { font-variant-numeric: tabular-nums; text-align:right; color:#9aa3b3; }
  input[type=range] { width:100%; accent-color:#5fa572; }
  .controls { display:flex; gap:.6rem; flex-wrap:wrap; margin-top:1rem; }
  button { padding:.55rem 1rem; font-weight:600; border:none; border-radius:9px;
           cursor:pointer; background:#3a4a78; color:white; }
  button:hover { background:#4f63a0; }
  button.alt { background:#2a3142; }
  .hex-art { display:flex; flex-direction:column-reverse; gap:8px;
             padding:1rem; background:#10131a; border-radius:10px; margin-top:1rem; }
  .line { height:14px; display:flex; gap:14px; }
  .seg  { flex:1; background:#d7c98a; border-radius:3px; }
  .label { color:#9aa3b3; font-size:.85rem; margin:.4rem 0 .2rem; }
  #img { display:block; image-rendering: pixelated;
         width: 100%; max-width: 360px; aspect-ratio:1/1;
         background:#10131a; border-radius:10px; margin: 0 auto; }
  .msg { color:#d7c98a; font-style:italic; margin-top:.6rem; min-height:1.2em; }
  .legend { color:#9aa3b3; font-size:.85rem; margin-top:.4rem; line-height:1.7; }

  /* 3D 网络结构可视化 */
  .arch3d-wrap { position:relative; margin-top:.8rem; }
  #arch3d { width:100%; height:340px; display:block;
            background:radial-gradient(ellipse at center, #161a24 0%, #0c0e14 100%);
            border-radius:12px; cursor:grab; }
  #arch3d:active { cursor:grabbing; }
  #archTip { position:absolute; pointer-events:none;
             background:rgba(20,24,34,.96); color:#e8e8ec;
             border:1px solid #3a4a78; border-radius:8px;
             padding:.5rem .7rem; font-size:.82rem;
             box-shadow:0 4px 14px rgba(0,0,0,.5);
             transform:translate(-50%, calc(-100% - 12px));
             white-space:nowrap; opacity:0; transition:opacity .12s;
             z-index:10; }
  #archTip .t { color:#d7c98a; font-weight:600; }
  #archTip .s { color:#9aa3b3; font-family:"Consolas", monospace;
                font-size:.78rem; margin-top:.2rem; }
  #archTip .n { color:#9aa3b3; font-size:.75rem; margin-top:.2rem; }
  .arch-empty { position:absolute; inset:0; display:flex; align-items:center;
                justify-content:center; color:#6c768a; font-size:.9rem;
                pointer-events:none; }
  /* 自下而上：z₆（上爻）在左，z₁（初爻）在右，与卦象阅读顺序一致 */
  .lat-bars { display:grid; grid-template-columns: repeat(6, 1fr); direction:rtl;
              gap:4px; margin-top:.5rem; }
  .lat-cell { direction:ltr; background:#10131a; border-radius:6px; padding:.3rem .15rem;
              text-align:center; font-size:.7rem; color:#9aa3b3;
              border:1px solid #2a3142; }
  .lat-cell .v { display:block; font-family: "Consolas", monospace;
                 color:#d7c98a; font-weight:600; font-size:.85rem;
                 margin-top:.15rem; font-variant-numeric: tabular-nums; }
  .arch-title { font-size:.78rem; color:#9aa3b3; text-transform:uppercase;
                letter-spacing:.06em; margin:.6rem 0 .3rem; }
</style>
</head>
<body>
<nav><a href="/">← 首页</a><a href="/train">训练 →</a></nav>
<h1>起卦 — 让模型为你想象</h1>

<div class="wrap">
  <div class="card">
    <h3 style="margin-top:0">六爻</h3>
    <p class="legend">每个滑块控制一个潜变量。正值对应<b>阳爻</b>（实线），
       负值对应<b>阴爻</b>（断线）。下方卦象自下而上读取，与《易经》传统一致。</p>
    <div id="yaos"></div>
    <div class="controls">
      <button id="btnRandom">随机起卦</button>
      <button class="alt" id="btnZero">归零</button>
      <button class="alt" id="btnReload">重新载入模型</button>
      <label style="display:flex; align-items:center; gap:.4rem; margin-left:auto;">
        <input type="checkbox" id="live" checked /> 实时更新
      </label>
    </div>
    <div style="margin-top:.9rem; display:flex; gap:.5rem; align-items:center; flex-wrap:wrap;">
      <label style="font-size:.8rem; color:#9aa3b3; margin:0;">模型权重</label>
      <select id="ckptSel" style="flex:1; min-width:160px; background:#10131a; color:#e8e8ec; border:1px solid #2a3142; padding:.45rem .55rem; border-radius:8px;"></select>
      <button class="alt" id="btnLoadCkpt" style="margin:0;">载入</button>
    </div>
    <div id="ckptStats" style="margin-top:.5rem; font-size:.78rem; color:#9aa3b3; line-height:1.6;"></div>
    <div class="hex-art" id="hexArt"></div>
    <div class="msg" id="status">…</div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">生成图像</h3>
    <img id="img" alt="解码生成的图像" />
    <div class="legend" id="zText" style="margin-top:.8rem; word-break:break-all;"></div>

    <div class="arch-title">VAE 张量形状（数据流）</div>
    <p class="legend" style="margin-top:0">输入 / 输出皆为二维图像，编码器逐步压缩为 6 维潜向量后再由解码器还原，
       侧视形成 <b style="color:#d7c98a">X 形</b> 漏斗。
       <span style="color:#5b86c4">蓝</span>=编码器，
       <span style="color:#d7c98a">金</span>=六爻潜变量，
       <span style="color:#5fa572">绿</span>=解码器。
       鼠标拖动旋转，悬停层片查看张量形状。</p>
    <div class="arch3d-wrap">
      <canvas id="arch3d"></canvas>
      <div id="archTip"></div>
      <div class="arch-empty" id="archEmpty">尚未载入模型，无法显示形状。</div>
    </div>
    <div class="arch-title">六爻潜向量 z（当前值）</div>
    <div class="lat-bars" id="latBars"></div>
  </div>
</div>

<script>
const YAO_NAMES = [
  '初爻 (1)', '二爻 (2)', '三爻 (3)',
  '四爻 (4)', '五爻 (5)', '上爻 (6)'
];
const $ = id => document.getElementById(id);

function buildSliders() {
  const host = $('yaos');
  host.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const row = document.createElement('div');
    row.className = 'yao-row';
    row.innerHTML = `
      <div class="yao-name">${YAO_NAMES[i]}</div>
      <input type="range" min="-3" max="3" step="0.05" value="0" data-i="${i}" />
      <div class="yao-value" id="v${i}">0.00</div>`;
    host.appendChild(row);
  }
  host.querySelectorAll('input[type=range]').forEach(el => {
    el.addEventListener('input', () => {
      $('v'+el.dataset.i).textContent = (+el.value).toFixed(2);
      drawHex();
      drawLatentBars();
      if ($('live').checked) requestDecode();
    });
  });
}

function getZ() {
  return Array.from(document.querySelectorAll('#yaos input[type=range]'))
              .map(el => +el.value);
}
function setZ(z) {
  document.querySelectorAll('#yaos input[type=range]').forEach((el,i) => {
    el.value = z[i];
    $('v'+i).textContent = (+z[i]).toFixed(2);
  });
  drawHex();
  drawLatentBars();
}

function drawHex() {
  const z = getZ();
  const host = $('hexArt');
  host.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const row = document.createElement('div');
    row.className = 'line';
    if (z[i] >= 0) {                    // 阳：单段实线
      const seg = document.createElement('div');
      seg.className = 'seg'; row.appendChild(seg);
    } else {                            // 阴：两段中间留缝
      const a = document.createElement('div'); a.className = 'seg';
      const b = document.createElement('div'); b.className = 'seg';
      row.appendChild(a); row.appendChild(b);
    }
    host.appendChild(row);
  }
}

function drawLatentBars() {
  const z = getZ();
  const host = $('latBars');
  host.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const cell = document.createElement('div');
    cell.className = 'lat-cell';
    const symbol = z[i] >= 0 ? '⚊ 阳' : '⚋ 阴';
    cell.innerHTML = `z<sub>${i+1}</sub> · ${symbol}<span class="v">${z[i].toFixed(2)}</span>`;
    host.appendChild(cell);
  }
}

function fmtShape(shape) {
  // shape 不含 batch 维，前置一个 B
  const dims = ['<span class="b">B</span>', ...shape.map(d => d)];
  return '(' + dims.join(' × ') + ')';
}

// 3D viz 由模块脚本注入到 window.updateArch3D
function renderArch(arch) {
  window.__lastArch = arch;
  if (window.updateArch3D) window.updateArch3D(arch, 1);
}

let pending = false, queued = false;
async function requestDecode() {
  if (pending) { queued = true; return; }
  pending = true;
  try {
    const z = getZ();
    const r = await fetch('/api/decode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ z }),
    });
    const j = await r.json();
    if (j.ok) {
      $('img').src = j.image;
      if (window.setOutputImage3D) window.setOutputImage3D(j.image);
      $('zText').textContent = 'z = [' + z.map(v=>v.toFixed(2)).join(', ') + ']';
      $('status').textContent = '';
    } else {
      $('status').textContent = j.error || '解码失败';
    }
  } catch (e) {
    $('status').textContent = e.message;
  } finally {
    pending = false;
    if (queued) { queued = false; requestDecode(); }
  }
}

$('btnRandom').onclick = () => {
  // Box-Muller 高斯噪声
  const z = Array.from({length:6}, () => {
    const u = Math.random() || 1e-9, v = Math.random() || 1e-9;
    return Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
  });
  setZ(z); requestDecode();
};
$('btnZero').onclick   = () => { setZ([0,0,0,0,0,0]); requestDecode(); };
$('btnReload').onclick = async () => {
  $('status').textContent = '正在重新载入模型…';
  const r = await fetch('/api/model/load', {method:'POST',
    headers:{'Content-Type':'application/json'}, body:'{}'});
  const j = await r.json();
  $('status').textContent = j.loaded ? '模型已载入' : '没有可用的模型权重';
  if (j.loaded) { await refreshInfo(); requestDecode(); }
  await refreshCheckpoints();
};

$('btnLoadCkpt').onclick = async () => {
  const ds = $('ckptSel').value;
  if (!ds) return;
  $('status').textContent = `载入 ${ds} 权重…`;
  const r = await fetch('/api/model/load', {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({dataset: ds})});
  const j = await r.json();
  $('status').textContent = j.loaded ? `${ds} 模型已载入` : `载入 ${ds} 失败`;
  if (j.loaded) { await refreshInfo(); requestDecode(); }
  await refreshCheckpoints();
};

function fmtNum(v, d=3) { return (v == null || isNaN(v)) ? '—' : (+v).toFixed(d); }

async function refreshCheckpoints() {
  try {
    const r = await fetch('/api/checkpoints');
    const j = await r.json();
    const sel = $('ckptSel');
    const prev = sel.value;
    sel.innerHTML = '';
    const items = j.items || [];
    if (!items.length) {
      const opt = document.createElement('option');
      opt.value = ''; opt.textContent = '（还没有保存的权重）';
      sel.appendChild(opt);
    }
    for (const it of items) {
      const opt = document.createElement('option');
      opt.value = it.dataset;
      const ep = it.info && it.info.epochs_completed != null ? it.info.epochs_completed : '?';
      const loss = it.info && it.info.last_loss != null ? fmtNum(it.info.last_loss) : '—';
      opt.textContent = `${it.dataset}  ·  ep ${ep}  ·  loss ${loss}`;
      sel.appendChild(opt);
    }
    const active = j.active || {};
    if (active.dataset) sel.value = active.dataset;
    else if (prev) sel.value = prev;
    renderCkptStats(active);
  } catch (e) { /* ignore */ }
}

function renderCkptStats(active) {
  const host = $('ckptStats');
  if (!active || !active.dataset) {
    host.innerHTML = '<i>未载入模型</i>';
    return;
  }
  const info = active.info || {};
  const cfg = info.config || {};
  host.innerHTML = `
    <div>数据集：<b style="color:#d7c98a;">${active.dataset}</b></div>
    <div>训练进度：${info.epochs_completed ?? '?'} 轮 · 损失 ${fmtNum(info.last_loss)}
         (recon ${fmtNum(info.last_recon)} · KLD ${fmtNum(info.last_kld)})</div>
    <div>超参：β=${info.beta ?? cfg.beta ?? '—'} · hidden=${info.hidden ?? cfg.hidden ?? '—'}
         · 尺寸 ${info.image_size ?? cfg.image_size ?? '—'}px</div>
    <div style="color:#6c768a;">更新：${info.updated_at || info.loaded_at || '—'}</div>`;
}

async function refreshInfo() {
  try {
    const r = await fetch('/api/model/info');
    const j = await r.json();
    if (j.loaded) {
      renderArch(j.arch);
      renderCkptStats({dataset: j.dataset, checkpoint: j.checkpoint, info: j.checkpoint_info || {}});
      return true;
    } else {
      renderArch(null);
      renderCkptStats({});
      return false;
    }
  } catch (e) { return false; }
}

buildSliders();
drawHex();
drawLatentBars();
(async () => {
  await refreshCheckpoints();
  const ok = await refreshInfo();
  if (ok) requestDecode();
  else $('status').textContent =
    '尚未训练模型 — 请先到「训练」页训练一个，然后回到此页点击「重新载入模型」。';
})();
</script>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import { createArchViz } from '/static/arch3d.js';
const viz = createArchViz({
  canvas: document.getElementById('arch3d'),
  tip:    document.getElementById('archTip'),
  empty:  document.getElementById('archEmpty'),
  // 推演模式只用解码器 — 把输入及编码器淡化，保留潜变量、解码器与输出图像
  dimOf: (i, n, role) => role === 'enc' || i === 0,
});
window.updateArch3D    = viz.update;
window.setOutputImage3D = viz.setOutputImage;
// If refreshInfo() ran before this module loaded, re-trigger once.
if (window.__lastArch !== undefined) viz.update(window.__lastArch, 1);
const _img = document.getElementById('img');
if (_img && _img.src) viz.setOutputImage(_img.src);
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Train · Yijing β-VAE</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background:#11141a; color:#e8e8ec;
         margin:0; padding:1.5rem; }
  h1 { margin:0 0 1rem; font-weight:600; }
  .grid { display:grid; gap:1.2rem;
          grid-template-columns: 320px 1fr; }
  @media (max-width: 800px) { .grid { grid-template-columns:1fr; } }
  .card { background:#1b1f2a; border-radius:14px; padding:1.2rem 1.4rem;
          box-shadow:0 4px 18px rgba(0,0,0,.4); }
  label { display:block; font-size:.8rem; color:#9aa3b3; margin-top:.7rem;
          text-transform:uppercase; letter-spacing:.06em; }
  input, select { width:100%; background:#10131a; color:#e8e8ec; border:1px solid #2a3142;
                  padding:.5rem .6rem; border-radius:8px; font-size:.95rem; margin-top:.25rem; }
  button { margin-top:1rem; padding:.7rem 1.1rem; font-weight:600; border:none;
           border-radius:9px; cursor:pointer; font-size:.95rem; }
  .start { background:#4f8c5e; color:white; }   .start:hover{ background:#5fa572; }
  .stop  { background:#9c4d4d; color:white; margin-left:.5rem; }
  .stop:hover { background:#b76060; }
  .stat { display:flex; justify-content:space-between; padding:.3rem 0;
          border-bottom:1px dashed #2a3142; font-variant-numeric:tabular-nums; }
  .stat:last-child { border:none; }
  .msg { color:#d7c98a; font-style:italic; margin-top:.6rem; }
  canvas { width:100%; height:260px; background:#10131a; border-radius:10px; }
  nav a { color:#8ab1ff; margin-right:1rem; text-decoration:none; }
  .progress { width:100%; height:8px; background:#10131a; border-radius:6px; overflow:hidden;
              margin-top:.6rem; }
  .progress > div { height:100%; background:linear-gradient(90deg,#3a4a78,#5fa572); width:0; }
</style>
</head>
<body>
<nav><a href="/">← Home</a><a href="/play">Play →</a></nav>
<h1>Train the Yijing β-VAE</h1>

<div class="grid">
  <div class="card">
    <h3 style="margin-top:0">Hyper-parameters</h3>
    <label>Dataset</label>
    <select id="dataset">
      <option value="stl10" selected>STL-10 (64×64 RGB photos, 100k unlabeled)</option>
      <option value="cifar10">CIFAR-10 (resized to 64×64)</option>
      <option value="mnist">MNIST (28×28 digits)</option>
      <option value="fashion">FashionMNIST (28×28)</option>
    </select>
    <label>Epochs</label><input id="epochs" type="number" value="20" min="1" />
    <label>Batch size</label><input id="batch_size" type="number" value="128" min="8" />
    <label>Learning rate</label><input id="lr" type="number" step="0.0001" value="0.001" />
    <label>β (KL weight)</label><input id="beta" type="number" step="0.5" value="4" />
    <label>Hidden channels</label><input id="hidden" type="number" value="64" />
    <label>Image size</label><input id="image_size" type="number" value="64" />
    <label>Device</label>
    <select id="device">
      <option value="cuda" selected>cuda (GPU)</option>
      <option value="auto">auto</option>
      <option value="cpu">cpu</option>
    </select>
    <div>
      <button class="start" id="btnStart">Start</button>
      <button class="stop"  id="btnStop">Stop</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Live status</h3>
    <div class="stat"><span>State</span><span id="s_msg">—</span></div>
    <div class="stat"><span>Epoch</span><span id="s_epoch">0 / 0</span></div>
    <div class="stat"><span>Step</span><span id="s_step">0 / 0</span></div>
    <div class="stat"><span>Loss</span><span id="s_loss">—</span></div>
    <div class="stat"><span>Recon</span><span id="s_recon">—</span></div>
    <div class="stat"><span>KLD</span><span id="s_kld">—</span></div>
    <div class="progress"><div id="bar"></div></div>
    <div class="msg" id="hint">Ready.</div>
    <canvas id="chart" width="600" height="260" style="margin-top:1rem"></canvas>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

async function start() {
  const body = {
    dataset: $('dataset').value,
    epochs:  +$('epochs').value,
    batch_size: +$('batch_size').value,
    lr:      +$('lr').value,
    beta:    +$('beta').value,
    hidden:  +$('hidden').value,
    image_size: +$('image_size').value,
    device:  $('device').value,
  };
  const r = await fetch('/api/train/start', {method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  const j = await r.json();
  $('hint').textContent = j.ok ? 'Training started.' : 'Already running.';
}
async function stop() {
  const r = await fetch('/api/train/stop', {method:'POST'});
  const j = await r.json();
  $('hint').textContent = j.ok ? 'Stop requested.' : 'Not running.';
}
$('btnStart').onclick = start;
$('btnStop').onclick  = stop;

// chart
const cv = $('chart'), ctx = cv.getContext('2d');
function drawChart(history) {
  const W = cv.width, H = cv.height, pad = 30;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#10131a'; ctx.fillRect(0,0,W,H);
  if (!history.length) return;
  const losses = history.map(h => h.loss);
  const max = Math.max(...losses), min = Math.min(...losses);
  const range = (max - min) || 1;
  ctx.strokeStyle = '#5fa572'; ctx.lineWidth = 2; ctx.beginPath();
  history.forEach((h,i) => {
    const x = pad + (W - 2*pad) * (i / Math.max(1, history.length-1));
    const y = H - pad - (H - 2*pad) * ((h.loss - min) / range);
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.fillStyle = '#9aa3b3'; ctx.font = '11px system-ui';
  ctx.fillText('loss '+min.toFixed(2), 4, H - pad);
  ctx.fillText('loss '+max.toFixed(2), 4, pad + 10);
  ctx.fillText('epoch 1', pad, H - 6);
  ctx.fillText('epoch '+history.length, W - pad - 40, H - 6);
}

async function poll() {
  try {
    const r = await fetch('/api/train/state');
    const s = await r.json();
    $('s_msg').textContent   = s.message;
    $('s_epoch').textContent = `${s.epoch} / ${s.total_epochs}`;
    $('s_step').textContent  = `${s.step} / ${s.steps_per_epoch}`;
    $('s_loss').textContent  = s.loss ? s.loss.toFixed(3) : '—';
    $('s_recon').textContent = s.recon ? s.recon.toFixed(3) : '—';
    $('s_kld').textContent   = s.kld ? s.kld.toFixed(3) : '—';
    let p = 0;
    if (s.total_epochs && s.steps_per_epoch) {
      p = ((s.epoch - 1) + (s.step / s.steps_per_epoch)) / s.total_epochs;
    } else if (s.message === 'finished') p = 1;
    $('bar').style.width = (Math.min(1, Math.max(0,p))*100).toFixed(1)+'%';
    drawChart(s.history || []);
  } catch (e) { /* ignore */ }
}
setInterval(poll, 800); poll();
</script>
</body>
</html>
